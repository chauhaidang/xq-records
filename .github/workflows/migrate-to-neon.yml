name: Migrate XQ Records Database to Neon

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Deployment mode'
        required: true
        default: 'migrate'
        type: choice
        options:
          - migrate
          - create-user
          - grant-permissions
          - setup-app-user
      confirm:
        description: 'Type "yes" to confirm deployment to the xq-records Neon database'
        required: true
        type: string

env:
  DATABASE_URL: ${{ secrets.XQ_RECORDS_DATABASE_URL }}
  DB_ADMIN_USER: ${{ secrets.XQ_RECORDS_DB_ADMIN_USER }}
  DB_ADMIN_PASSWORD: ${{ secrets.XQ_RECORD_DB_ADMIN_PW }}
  APP_DB_USER: ${{ vars.XQ_RECORDS_APP_DB_USER || 'xq_records_app_user' }}
  APP_DB_PASSWORD: ${{ secrets.XQ_RECORDS_APP_DB_PASSWORD }}

jobs:
  validate:
    name: Validate Migration Request
    runs-on: ubuntu-latest
    steps:
      - name: Check confirmation
        run: |
          if [[ "${{ github.event.inputs.confirm }}" != "yes" ]]; then
            echo "Migration not confirmed. Type 'yes' in the confirm field."
            exit 1
          fi
          echo "Migration confirmed"

      - name: Check secret
        run: |
          if [[ -z "${DATABASE_URL}" ]]; then
            echo "Missing required secret: XQ_RECORDS_DATABASE_URL"
            exit 1
          fi
          echo "XQ_RECORDS_DATABASE_URL is configured"

          if [[ -z "${DB_ADMIN_USER}" ]]; then
            echo "Missing required secret: XQ_RECORDS_DB_ADMIN_USER"
            exit 1
          fi
          echo "XQ_RECORDS_DB_ADMIN_USER is configured"

          if [[ -z "${DB_ADMIN_PASSWORD}" ]]; then
            echo "Missing required secret: XQ_RECORD_DB_ADMIN_PW"
            exit 1
          fi
          echo "XQ_RECORD_DB_ADMIN_PW is configured"

          case "${{ github.event.inputs.mode }}" in
            create-user|setup-app-user)
              if [[ -z "${APP_DB_PASSWORD}" ]]; then
                echo "Missing required secret for selected mode: XQ_RECORDS_APP_DB_PASSWORD"
                exit 1
              fi
              echo "XQ_RECORDS_APP_DB_PASSWORD is configured"
              ;;
          esac

  migrate:
    name: Run XQ Records Database Deployment
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: xq-records/package-lock.json

      - name: Install dependencies
        working-directory: xq-records
        run: npm ci

      - name: Install PostgreSQL client
        if: github.event.inputs.mode == 'create-user' || github.event.inputs.mode == 'grant-permissions' || github.event.inputs.mode == 'setup-app-user'
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Validate Prisma schema
        if: github.event.inputs.mode == 'migrate'
        working-directory: xq-records
        run: npx prisma validate

      - name: Deploy Prisma migrations
        if: github.event.inputs.mode == 'migrate'
        working-directory: xq-records
        run: npx prisma migrate deploy

      - name: Verify records tables
        if: github.event.inputs.mode == 'migrate'
        run: |
          npm --prefix xq-records exec prisma -- db execute --stdin <<'SQL'
          DO $$
          DECLARE
            table_count integer;
          BEGIN
            SELECT COUNT(*)
            INTO table_count
            FROM information_schema.tables
            WHERE table_schema = 'public'
              AND table_name IN ('object_types', 'objects', 'object_versions');

            IF table_count <> 3 THEN
              RAISE EXCEPTION 'Expected 3 xq-records tables, found %', table_count;
            END IF;
          END
          $$;
          SQL

      - name: Create or update application user
        if: github.event.inputs.mode == 'create-user' || github.event.inputs.mode == 'setup-app-user'
        working-directory: xq-records
        run: |
          PGUSER="$DB_ADMIN_USER" PGPASSWORD="$DB_ADMIN_PASSWORD" psql "$DATABASE_URL" \
            -v ON_ERROR_STOP=1 \
            -v app_user="$APP_DB_USER" \
            -v app_password="$APP_DB_PASSWORD" \
            -f scripts/create-app-user-neon.sql

      - name: Grant application permissions
        if: github.event.inputs.mode == 'grant-permissions' || github.event.inputs.mode == 'setup-app-user'
        working-directory: xq-records
        run: |
          PGUSER="$DB_ADMIN_USER" PGPASSWORD="$DB_ADMIN_PASSWORD" psql "$DATABASE_URL" \
            -v ON_ERROR_STOP=1 \
            -v app_user="$APP_DB_USER" \
            -f scripts/grant-permissions-neon.sql

      - name: Migration summary
        if: success()
        run: |
          echo "XQ Records database deployment completed successfully"
          echo "Mode: ${{ github.event.inputs.mode }}"
          echo "Time: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "Triggered by: ${{ github.actor }}"
